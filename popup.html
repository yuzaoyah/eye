<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye 扩展选项</title>
    <style>
        body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
          padding: 20px;
          min-width: 300px;
          max-width: 400px;
          margin: 0;
          background-color: #f8f9fa;
        }

        h2 {
          color: #333;
          margin-bottom: 20px;
          font-size: 18px;
          font-weight: 600;
        }

        .form-group {
          margin-bottom: 20px;
        }

        label {
          display: block;
          margin-bottom: 8px;
          color: #555;
          font-size: 14px;
          font-weight: 500;
        }

        input[type="text"] {
          width: 100%;
          padding: 10px 12px;
          font-size: 14px;
          border: 1px solid #ddd;
          border-radius: 8px;
          outline: none;
          transition: border-color 0.3s ease;
          box-sizing: border-box;
        }

        input[type="text"]:focus {
          border-color: #6763ab;
          box-shadow: 0 0 0 3px rgba(103, 99, 171, 0.1);
        }

        button {
          width: 100%;
          padding: 10px 20px;
          font-size: 14px;
          cursor: pointer;
          border: none;
          background-color: #6763ab;
          color: #fff;
          border-radius: 8px;
          transition: background-color 0.3s ease, transform 0.1s ease;
          font-weight: 500;
        }

        button:hover {
          background-color: #9370db;
        }

        button:active {
          transform: scale(0.98);
        }

        button:disabled {
          background-color: #ccc;
          cursor: not-allowed;
          transform: none;
        }

        /* 消息提示 */
        .message {
          padding: 12px 20px;
          border-radius: 8px;
          color: white;
          font-weight: 500;
          margin-bottom: 15px;
          text-align: center;
          transition: opacity 0.3s ease;
          font-size: 14px;
        }

        .message.success {
          background-color: #28a745;
        }

        .message.error {
          background-color: #dc3545;
        }

        /* 版本信息 */
        .version-info {
          margin-top: 20px;
          padding-top: 15px;
          border-top: 1px solid #eee;
          text-align: center;
        }

        .version-info span {
          font-size: 12px;
          color: #999;
        }

        /* 响应式设计 */
        @media screen and (max-width: 400px) {
          body {
            padding: 15px;
            min-width: auto;
            max-width: none;
          }

          h2 {
            font-size: 16px;
          }

          .form-group {
            margin-bottom: 15px;
          }

          input[type="text"],
          button {
            font-size: 13px;
            padding: 8px 10px;
          }
        }
    </style>
</head>

<body>
<h2>Eye 扩展选项</h2>

<!-- 消息提示区域 -->
<div id="message-container"></div>

<div class="form-group">
    <label for="newTabContent">新标签页内容：</label>
    <input type="text" id="newTabContent" placeholder="输入要显示的内容">
</div>

<button id="saveBtn">保存</button>

<div class="version-info">
    <span id="version"></span>
</div>

<script src="popup.js"></script>
</body>

</html>
