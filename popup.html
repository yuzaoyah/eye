<!DOCTYPE html>
<html>
<head>
  <title>Custom New Tab Options</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    label {
      display: block;
      margin-bottom: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 5px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Custom New Tab Options</h2>
  <label for="newTabContent">Enter content for new tab:</label>
  <input type="text" id="newTabContent">
  <button id="saveBtn">Save</button>

  <script src="popup.js"></script>
</body>
</html>
